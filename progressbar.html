<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>


<div class="container">
    <strong><h2>Basic Progress bars</h2></strong>
    <p>To create a default progress bar, add a .progress-bar class to a div element and add the progress-bar class to its child element. use the CSS width property to set the width of the progress bar:</p>
    <div class="progress">
        <div class="progress-bar progress-bar" style="width: 70%">70%</div>
    </div>
</div>   
</body>
</html>
